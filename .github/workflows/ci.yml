# W1 item 30 — CI: syntax checks + the full test suite on every push.
# A red X beats a broken Pages deploy.
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Run static checks + full suite
        run: sh test/run.sh
