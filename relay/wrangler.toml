name = "kevinos-relay"
main = "worker.js"
compatibility_date = "2024-11-01"

# Cloudflare Workers AI — a free Council seat with NO API key (10k neurons/day).
# This binding is the only thing the Cloudflare seat needs.
[ai]
binding = "AI"

# Web Push reminder store (Phase 2b) — subscriptions + the app's synced reminder set.
[[kv_namespaces]]
binding = "PUSH"
id = "8aa1aff4ad944e1b840d6c9a4647338b"

# Cross-device sync store (Phase 3) — one last-write-wins document per passphrase.
# The app sends sha256(passphrase) as the row key; the DB lives only on the relay.
[[d1_databases]]
binding = "SYNC"
database_name = "kevinos-sync"
database_id = "7d0fff71-2b8b-4f90-a23e-5a35049bb2f1"

# Fire due reminders every minute (Phase 2b).
[triggers]
crons = ["* * * * *"]

# The single-model endpoint (/ai) uses PROVIDER. The Council (/council) uses every
# seat whose credential is present, independent of PROVIDER.
[vars]
PROVIDER = "gemini"
ALLOW_ORIGIN = "https://kevinbigham.github.io"
CLAUDE_MODEL = "claude-haiku-4-5-20251001"
GEMINI_MODEL = "gemini-2.5-flash"
CF_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
GROQ_MODEL = "llama-3.3-70b-versatile"
MISTRAL_MODEL = "mistral-small-latest"
OPENROUTER_MODEL = "qwen/qwen3-next-80b-a3b-instruct:free,meta-llama/llama-3.3-70b-instruct:free,google/gemma-4-31b-it:free"
MAX_TOKENS = "1024"

# Web Push (Phase 2b). The VAPID public key is meant to be public — the app
# advertises it as applicationServerKey. The matching private key is a secret:
#   npx wrangler secret put VAPID_PRIVATE_KEY
VAPID_PUBLIC_KEY = "BFF-1pgElFELUsaWJ54X-9c2rLMxIBSA-FeS1kQ3hyOMpxRw2T9ieBkl-tVK25vh1v75FwrmqgYKoCeM22ZCJDE"
VAPID_SUBJECT = "https://kevinbigham.github.io/kevinos/"

# GitHub OAuth (Phase 2b) — moves the GitHub token off-device onto the relay.
# Client ID is public (lives here); the client secret is a secret. Both come from
# the OAuth App registered at github.com/settings/developers (callback URL =
# https://kevinos-relay.kevinbigham.workers.dev/github/callback):
#   npx wrangler secret put GITHUB_CLIENT_SECRET
GITHUB_CLIENT_ID = "Ov23lixf4auBApdAVsRA"

# Keys are secrets, never here. Each Council seat turns on when its secret exists:
#   npx wrangler secret put GEMINI_API_KEY       # Gemini      (already set)
#   npx wrangler secret put GROQ_API_KEY         # Groq        https://console.groq.com/keys
#   npx wrangler secret put MISTRAL_API_KEY      # Mistral     https://console.mistral.ai/api-keys
#   npx wrangler secret put OPENROUTER_API_KEY   # OpenRouter  https://openrouter.ai/keys
# The Cloudflare seat needs no key — just the [ai] binding above.
# OPENROUTER_MODEL is a comma-separated fallback chain — OpenRouter routes to the
# first available model, skipping rate-limited/paid ones. Add current free slugs
# from https://openrouter.ai/models?max_price=0
