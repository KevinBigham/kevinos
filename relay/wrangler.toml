name = "kevinos-relay"
main = "worker.js"
compatibility_date = "2024-11-01"

# Which AI to use: "claude" or "gemini". Switch any time, then redeploy.
[vars]
PROVIDER = "gemini"
ALLOW_ORIGIN = "https://kevinbigham.github.io"
CLAUDE_MODEL = "claude-haiku-4-5-20251001"
GEMINI_MODEL = "gemini-2.5-flash"
MAX_TOKENS = "1024"

# The API key is NOT here — it's a secret. Set it with:
#   npx wrangler secret put ANTHROPIC_API_KEY     (if PROVIDER = "claude")
#   npx wrangler secret put GEMINI_API_KEY        (if PROVIDER = "gemini")
